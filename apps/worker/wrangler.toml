name = "dprabota"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "tarbie-db"
database_id = "87e867fe-6797-431f-adc3-59593cee80af"

[[kv_namespaces]]
binding = "KV"
id = "4302997f858144d481fade050ff55e8b"

# Avatars are stored in R2 (KV is unsuited for blobs and would blow the 1 GB cap
# at ~5000 users with 200 KB avatars). Bucket must be created once:
#   wrangler r2 bucket create tarbie-avatars
# Enable R2 in Cloudflare Dashboard first, then uncomment:
# [[r2_buckets]]
# binding = "AVATARS"
# bucket_name = "tarbie-avatars"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "tarbie-notifications"

[vars]
ENVIRONMENT = "production"
APP_URL = "https://tarbie.online"

[triggers]
crons = ["0 4 * * *"]

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# WHATSAPP_TOKEN
# WHATSAPP_PHONE_NUMBER_ID
# GEMINI_API_KEY
