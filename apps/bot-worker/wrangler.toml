name = "tarbie-bot"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "tarbie-db"
database_id = "87e867fe-6797-431f-adc3-59593cee80af"

[[kv_namespaces]]
binding = "KV"
id = "4302997f858144d481fade050ff55e8b"

[[queues.consumers]]
queue = "tarbie-notifications"
max_batch_size = 25
max_batch_timeout = 5
# Telegram global limit ~30 msg/sec. With max_concurrency=1 and ~25 msg/sec inside one
# isolate, we stay below the limit without needing a KV-based counter. If we hit a 429
# the consumer surfaces retry_after from Telegram and the queue retries with that delay.
max_concurrency = 1
max_retries = 3

[vars]
ENVIRONMENT = "production"
APP_URL = "https://tarbie.online"
